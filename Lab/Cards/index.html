<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Playing Cards</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container">
      <div class="card">
        <div class="top">
          <span>A</span>
          <span>♠</span>
        </div>
        <div class="middle">
          <span>♠</span>
        </div>
        <div class="bottom">
          <span>♠</span>
          <span>A</span>
        </div>
      </div>
      <div class="card">
        <div class="top">
          <span>2</span>
          <span>♣</span>
        </div>
        <div class="middle">
          <span>♣</span>
          <span class="down">♣</span>
        </div>
        <div class="bottom">
          <span>♣</span>
          <span>2</span>
        </div>
      </div>
       <div class="card">
        <div class="top">
          <span class="icon">3</span>
          <span class="icon">♥</span>
        </div>
        <div class="middle">
          <span class="icon">♥</span>
          <span class="down icon" >♥</span>
           <span class="up icon">♥</span>
        </div>
        <div class="bottom">
          <span class="icon">♥</span>
          <span class="icon">3</span>
        </div>
      </div>
       <div class="card">
        <div class="top">
          <span>4</span>
          <span>♣</span>
        </div>
        <div class="middle">
          <span>♣♣</span>
          
          <span class="down">♣♣</span>
        </div>
        <div class="bottom">
          <span>♣</span>
          <span>4</span>
        </div>
      </div>
       <div class="card">
        <div class="top">
          <span class="icon">5</span>
          <span class="icon">♦</span>
        </div>
        <div class="middle">
          <span class="icon">♦♦</span>
          <span class="down icon" >♦</span>
           <span class="up icon">♦♦</span>
        </div>
        <div class="bottom">
          <span class="icon">♦</span>
          <span class="icon">5</span>
        </div>
      </div>
    </div>
  </body>
</html>

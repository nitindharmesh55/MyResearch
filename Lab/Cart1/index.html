<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart 01</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="shopping-cart">
    <h2>Your Cart</h2>
<ul class="cart-items">
    <li class="cart-item">
        <span class="item-name">T-Shirt</span>
        <input type="number" min="1" value="2" class="quantity-input" aria-label="Quantity For T-shirt" >
        <button class="remove-btn">Remove</button>

    </li>

    <li class="cart-item">
        <span class="item-name">Hat</span>
        <input type="number" min="1" class="quantity-input" aria-label="quantity For Hat">
        <button class="remove-btn">Remove</button>
    </li>
</ul>

</div>
    
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Settings</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-control">
        <h1>Game Settings</h1>
        <label for="sound">
          <input type="checkbox" id="sound">
          Sound Effect
        </label>
        <label for="Gf">
            <input type="checkbox" name="Gf" id="Gf">
            Graphic Card
        </label>

        <label for="bg">
            <input type="checkbox" name="bg" id="bg">
            Background Music
        </label>

        <label for="hd">
            <input type="checkbox" name="hd" id="hd">
            Hard Mode
        </label>
    </div>
</body>
</html>

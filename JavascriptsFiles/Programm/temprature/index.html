<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temprature Conversion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form action="#">
        <h1>Temprature Coversion</h1>
        <!-- number field for value -->
        <input type="number" id="textBox" value="0"><br>

        <input type="radio" id="to-Fahrenheit" name="unit">
        <label for="to-Fahrenheit">Fahrenheit to Celsius</label> <br>

        <input type="radio"  id="to-celsius" name="unit">
        <label for="to-celsius">Celsius to Fahrenheit</label><br>
        <button type="button" id="myBtn">Convert</button>
        <p id="result">Select a Unit</p>
    </form>
    
    <script src="index.js"></script>
</body>
</html>

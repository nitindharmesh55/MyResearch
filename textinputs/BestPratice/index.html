<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Best Practices</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form action="#" class="accessible-form">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Enter your username">
        <button type="submit">Submit</button>
    </form>

    <form action="#" class="accessible-form">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" placeholder="Nitin@google.com">
        <button type="submit">submit</button>
    </form>

    <form action="#" class="accessible-form">
        <label for="message">Your Message</label>
        <textarea name="message" id="message" placeholder="Type your message here..."></textarea>
        <button type="submit">Submit</button>
    </form>

    <form action="#" class="accessible-form">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" placeholder="Enter your name">

        <label for="email">Email Address</label>
        <input type="email" name="email" id="email" placeholder="Nitin@google.com">

        <button type="submit">Submit</button>
    </form>
    <h2>Email Verificaiton</h2>

    <form action="#" class="accessible-form">
        <label for="email">Email Address</label>
        <input type="email" name="email" id="email" placeholder="nitin@google.com" aria-describedby="email-error">
        <p id="email-error" class="error-message">
            Please enter a valid email address
        </p>
        <button type="submit">Submit</button>
    </form>

    <h3>Checklist</h3>
    <form action="#" class="accessible-form">
        <label>
            <input type="checkbox" class="checkbox">Agree
        </label>
    </form>


    <form action="#" class="accessible-form">
        <label for="favorite-color">Pick your favorite color</label>
        <input type="color" id="favorite-color" name="favorite-color">
    </form>


    <form action="#" class="accessible-form">
        <label for="birthdate">Select Your Birthdate</label>
        <input type="date" name="birthdate" id="birthdate">
    </form>

</body>
</html>
